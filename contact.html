<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Inclusive Fitness</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="container navbar">

            <div class="logo">Inclusive Fitness</div>

            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <!-- PAGE TITLE -->
    <section class="page-title">
        <div class="container">
            <h1>Contact</h1>
            <p>Start a conversation about inclusive training, school programs, or in-home support.</p>
        </div>
    </section>

    <!-- CONTACT SECTION -->
    <section class="services-page">

        <div class="container">

            <form class="contact-form">

                <label>Name</label>
                <input type="text" placeholder="Your name">

                <label>Email</label>
                <input type="email" placeholder="Your email">

                <label>Who is this for?</label>
                <select>
                    <option>Personal Training</option>
                    <option>School Program</option>
                    <option>Group Home</option>
                    <option>Private / Home Gym</option>
                </select>

                <label>Message</label>
                <textarea rows="6" placeholder="Tell me a bit about your needs..."></textarea>

                <button type="submit" class="btn-primary">Send Message</button>

            </form>

        </div>

    </section>

</body>

</html>
