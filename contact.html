<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Inclusive Fitness</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="container navbar">

            <div class="logo">Inclusive Fitness</div>

            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <!-- PAGE TITLE -->
    <section class="page-title">
        <div class="container">
            <h1>Contact</h1>
            <p>    Start a conversation about inclusive fitness training,
    school programs, community partnerships, or in-home services.
</p>
        </div>
    </section>

    <!-- CONTACT SECTION -->
    <section class="services-page">

        <div class="container">

            <form class="contact-form" action="https://formspree.io/f/mykoqnae" method="POST">

            <label>Name</label>
<input type="text" name="name" placeholder="Your name" required>

<label>Email</label>
<input type="email" name="email" placeholder="Your email" required>

<label>Who is this for?</label>
<select name="service">
    <option>Personal Training</option>
    <option>School Program</option>
    <option>Group Home</option>
    <option>Private / Home Gym</option>
    <option>Community Organization / Partnership</option>
</select>

<label>Message</label>
<textarea name="message" rows="6" placeholder="Tell me a bit about your needs..." required></textarea>

<button type="submit" class="btn-primary">
    Send Message
</button>

            </form>

        </div>

    </section>

</body>

</html>
